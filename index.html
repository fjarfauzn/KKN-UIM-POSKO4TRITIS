<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline KKN Padukuhan Tritis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .gantt-col { min-width: 32px; max-width: 32px; width: 32px; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
        
        <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white rounded-2xl shadow-xl p-6 sm:p-8 mb-8 relative overflow-hidden">
            <div class="relative flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <span class="bg-emerald-500/20 text-emerald-400 text-xs font-semibold tracking-wider uppercase px-3 py-1 rounded-full border border-emerald-500/30">
                        <i class="fa-solid fa-calendar-days mr-1.5"></i> Kalender KKN Posko 4 
                    </span>
                    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mt-3">Timeline KKN Dusun Tritis</h1>
                    <p class="text-slate-300 text-sm sm:text-base mt-2 flex items-center gap-2">
                        <span>Periode Kegiatan:</span>
                        <span class="bg-slate-800 px-2.5 py-0.5 rounded text-amber-400 font-mono text-xs font-semibold">10 Agustus - 13 September 2026</span>
                    </p>
                </div>
                <div class="flex flex-wrap gap-2.5 no-print">
                    <button onclick="openAddModal()" class="bg-emerald-500 hover:bg-emerald-600 transition text-white px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center shadow-lg">
                        <i class="fa-solid fa-plus mr-2"></i> Tambah Kegiatan
                    </button>
                    <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 transition text-slate-200 px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center border border-slate-700">
                        <i class="fa-solid fa-print mr-2"></i> Cetak / PDF
                    </button>
                    <button onclick="fetchTasksFromAppsScript()" class="bg-indigo-500/20 hover:bg-indigo-500/30 text-indigo-300 transition px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center border border-indigo-500/30">
                        <i class="fa-solid fa-arrows-rotate mr-2"></i> Muat Ulang
                    </button>
                </div>
            </div>
        </header>

        <section class="bg-white rounded-xl shadow-md border border-slate-100 p-5 mb-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1.5">Cari Kegiatan</label>
                    <input id="searchInput" type="text" oninput="applyFilters()" placeholder="Cari proker, tugas, atau PIC..." 
                           class="w-full px-4 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1.5">PIC Utama</label>
                    <select id="picFilter" onchange="applyFilters()" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="all">Semua Penanggung Jawab</option>
                        <option value="Ketua">Ketua</option>
                        <option value="Sekretaris">Sekretaris</option>
                        <option value="Humas">Humas</option>
                        <option value="Bendahara">Bendahara</option>
                        <option value="Perkap">Perkap</option>
                        <option value="PDD">PDD / Social Media</option>
                        <option value="Seluruh">Seluruh Anggota</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1.5">Kategori</label>
                    <select id="categoryFilter" onchange="applyFilters()" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="all">Semua Kategori</option>
                        <option value="persiapan">Persiapan & Koordinasi</option>
                        <option value="pelaksanaan">Pelaksanaan Program</option>
                        <option value="publikasi">Publikasi & Dokumentasi</option>
                        <option value="evaluasi">Evaluasi & Rapat Bersama</option>
                        <option value="administrasi">Administrasi & Laporan</option>
                        <option value="perlengkapan">Perlengkapan & Logistik</option>
                        <option value="penutupan">Penutupan & Perpisahan</option>
                        <option value="kepulangan">Kepulangan</option>
                    </select>
                </div>
            </div>
        </section>

        <div id="loadingState" class="hidden flex items-center justify-center p-8 bg-white rounded-xl shadow-md mb-8 gap-3 text-indigo-600 font-semibold text-sm">
            <i class="fa-solid fa-spinner animate-spin text-xl"></i> Memuat data dari Google Sheets...
        </div>

        <main id="ganttViewContainer" class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden mb-8">
            <div class="overflow-x-auto custom-scrollbar w-full">
                <table class="w-full border-collapse text-left" id="ganttTable">
                    <thead>
                        <tr class="bg-indigo-950 text-slate-200 text-xs font-bold uppercase tracking-wider divide-x divide-indigo-900 border-b border-indigo-900">
                            <th colspan="4" class="px-4 py-3 bg-indigo-950 sticky left-0 z-20 text-center">Informasi Kegiatan</th>
                            <th colspan="22" class="px-2 py-3 text-center bg-indigo-950">Agustus 2026</th>
                            <th colspan="13" class="px-2 py-3 text-center bg-indigo-900/40">September 2026</th>
                        </tr>
                        <tr id="dayGridHeader" class="bg-slate-900 text-slate-300 font-mono text-center text-xs divide-x divide-slate-800 border-b border-slate-800">
                            <th class="px-3 py-2 bg-slate-900 sticky left-0 z-20 text-center w-12">No</th>
                            <th class="px-4 py-2 bg-slate-900 sticky left-[48px] z-20 text-left min-w-[140px]">Tanggal</th>
                            <th class="px-5 py-2 bg-slate-900 sticky left-[188px] z-20 text-left min-w-[280px]">Nama Kegiatan</th>
                            <th class="px-4 py-2 bg-slate-900 sticky left-[468px] z-20 text-left min-w-[150px]">Penanggung Jawab</th>
                        </tr>
                    </thead>
                    <tbody id="ganttTableBody" class="divide-y divide-slate-100 text-sm font-medium">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // URL SCRIPT GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwpDUeIBols3aBvHbTIvLfzrG_PeOZ6NaJFRixmRZ8_5Nvew47MC_0nPtQz_X2cHSB/exec";

        let tasks = [];

        const categoryConfig = {
            persiapan: { bg: 'bg-indigo-600', hover: 'hover:bg-indigo-700' },
            pelaksanaan: { bg: 'bg-emerald-500', hover: 'hover:bg-emerald-600' },
            publikasi: { bg: 'bg-purple-500', hover: 'hover:bg-purple-600' },
            evaluasi: { bg: 'bg-amber-500', hover: 'hover:bg-amber-600' },
            administrasi: { bg: 'bg-cyan-500', hover: 'hover:bg-cyan-600' },
            perlengkapan: { bg: 'bg-orange-500', hover: 'hover:bg-orange-600' },
            penutupan: { bg: 'bg-rose-500', hover: 'hover:bg-rose-600' },
            kepulangan: { bg: 'bg-slate-500', hover: 'hover:bg-slate-600' }
        };

        const totalDates = [];

        function generateCalendarDates() {
            for (let d = 10; d <= 31; d++) {
                totalDates.push({ day: d, dateString: `2026-08-${d.toString().padStart(2, '0')}`, fullText: `${d} Agst 2026` });
            }
            for (let d = 1; d <= 13; d++) {
                totalDates.push({ day: d, dateString: `2026-09-${d.toString().padStart(2, '0')}`, fullText: `${d} Sept 2026` });
            }
        }

        window.onload = function() {
            generateCalendarDates();
            loadHeaderDays();
            fetchTasksFromAppsScript();
        }

        async function fetchTasksFromAppsScript() {
            document.getElementById('loadingState').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                tasks = data;
                renderTimeline();
            } catch (err) {
                console.error(err);
                alert("Gagal memuat data dari Google Sheets. Pastikan format header di Google Sheets sudah sesuai.");
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
            }
        }

        function loadHeaderDays() {
            const headerRow = document.getElementById('dayGridHeader');
            totalDates.forEach(date => {
                const th = document.createElement('th');
                th.className = 'gantt-col py-2 font-mono text-[10px] font-semibold text-center hover:bg-slate-800 transition-colors';
                th.innerText = date.day;
                th.title = date.fullText;
                headerRow.appendChild(th);
            });
        }

        function isDateInSpan(checkedDate, startDate, endDate) {
            const chk = new Date(checkedDate);
            const start = new Date(startDate);
            const end = new Date(endDate);
            return chk >= start && chk <= end;
        }

        function formatDateRange(startStr, endStr) {
            if(!startStr || !endStr) return "";
            const start = new Date(startStr);
            const end = new Date(endStr);
            const options = { day: 'numeric', month: 'short' };
            const startFormatted = start.toLocaleDateString('id-ID', options);
            const endFormatted = end.toLocaleDateString('id-ID', options);
            
            if (startStr === endStr) return startFormatted;
            if (start.getMonth() === end.getMonth()) return `${start.getDate()}–${endFormatted}`;
            return `${startFormatted} – ${endFormatted}`;
        }

        function renderTimeline() {
    const tableBody = document.getElementById('ganttTableBody');
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const picFilter = document.getElementById('picFilter').value;
    const catFilter = document.getElementById('categoryFilter').value;
    
    tableBody.innerHTML = '';

    const filteredTasks = tasks.filter(task => {
        const text = task.text || '';
        const pic = task.pic || '';
        const category = task.category || '';

        const matchesSearch = text.toLowerCase().includes(searchVal) || pic.toLowerCase().includes(searchVal);
        const matchesPic = picFilter === 'all' || pic.toLowerCase().includes(picFilter.toLowerCase());
        const matchesCat = catFilter === 'all' || category === catFilter;

        return matchesSearch && matchesPic && matchesCat;
    });

    filteredTasks.forEach((task, idx) => {
        const config = categoryConfig[task.category] || categoryConfig.persiapan;
        
        // Mengatasi Invalid Date jika rentang tanggal start/end kosong di sheet
        let formattedDate = task.tanggalText;
        if (task.start && task.end) {
            formattedDate = formatDateRange(task.start, task.end);
        }

        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50 border-b border-slate-100 transition duration-150';

        tr.innerHTML = `
            <td class="px-3 py-3 text-center text-slate-400 font-mono text-xs bg-white sticky left-0 z-10 border-r border-slate-100">${task.no || (idx + 1)}</td>
            <td class="px-4 py-3 text-slate-600 text-xs font-semibold bg-white sticky left-[48px] z-10 border-r border-slate-100">${formattedDate}</td>
            <td class="px-5 py-3 text-slate-800 text-xs font-semibold max-w-[320px] bg-white sticky left-[188px] z-10 border-r border-slate-100">${task.text}</td>
            <td class="px-4 py-3 bg-white sticky left-[468px] z-10 border-r border-slate-100">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium bg-slate-100 border border-slate-200 text-slate-700">${task.pic}</span>
            </td>
        `;

        totalDates.forEach(dateObj => {
            const tdCell = document.createElement('td');
            tdCell.className = 'gantt-col border-r border-slate-100/70 p-1 text-center align-middle relative h-full';
            
            if (task.start && task.end && isDateInSpan(dateObj.dateString, task.start, task.end)) {
                const blockDiv = document.createElement('div');
                blockDiv.className = `${config.bg} ${config.hover} h-6 rounded-md shadow-sm transition-all duration-150 flex items-center justify-center text-[8px] text-white font-bold`;
                blockDiv.title = `${task.text}\n(${formattedDate})\n[${task.pic}]`;
                tdCell.appendChild(blockDiv);
            }
            
            tr.appendChild(tdCell);
        });

        tableBody.appendChild(tr);
    });
}

        function applyFilters() { renderTimeline(); }
    </script>
</body>
</html>
