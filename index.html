<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline KKN Padukuhan Tritis</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: white;
                color: black;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- MAIN CONTAINER -->
    <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 w-full flex-grow flex flex-col">
        
        <!-- HEADER BOARD -->
        <header class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white rounded-2xl shadow-xl p-6 sm:p-8 mb-6 relative overflow-hidden flex-shrink-0">
            <div class="absolute -right-16 -top-16 w-64 h-64 bg-indigo-500 rounded-full opacity-10 blur-3xl"></div>
            <div class="absolute -left-16 -bottom-16 w-64 h-64 bg-emerald-500 rounded-full opacity-10 blur-3xl"></div>
            
            <div class="relative flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <span class="bg-emerald-500/20 text-emerald-400 text-xs font-semibold tracking-wider uppercase px-3 py-1 rounded-full border border-emerald-500/30">
                        <i class="fa-solid fa-calendar-days mr-1.5"></i> Kalender KKN Posko 4 
                    </span>
                    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight mt-3">Timeline KKN dusun Tritis</h1>
                    <p class="text-slate-300 text-sm sm:text-base mt-2 flex items-center gap-2">
                        <span>Periode Kegiatan:</span>
                        <span class="bg-slate-800 px-2.5 py-0.5 rounded text-amber-400 font-mono text-xs font-semibold">10 Agustus - 13 September 2026</span>
                    </p>
                </div>
                <div class="flex flex-wrap gap-2.5 no-print">
                    <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 active:bg-slate-600 transition duration-150 text-slate-200 px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center border border-slate-700">
                        <i class="fa-solid fa-print mr-2"></i> Cetak / PDF
                    </button>
                </div>
            </div>
        </header>

        <!-- INFO BAR -->
        <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4 mb-6 text-emerald-900 text-xs sm:text-sm flex items-center justify-between no-print">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-emerald-600 text-base"></i>
                <span><strong>Mode Edit Aktif:</strong> Kamu dan teman-teman KKN bisa langsung mengetik dan mengedit isi sel di bawah ini!</span>
            </div>
        </div>

        <!-- GOOGLE SHEETS EDITABLE IFRAME CONTAINER -->
        <main class="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden flex-grow min-h-[750px] mb-8 relative">
            <iframe 
                src="https://docs.google.com/spreadsheets/d/1ScsiJIurJQp2E89yzlzqvZNrLYkCat4g1mfLeYaHCMv75m0YCzjsEI5VfJJ61l0R2bIaO9k6Ef44d5/edit?usp=sharing&rm=minimal"
                class="w-full h-full min-h-[750px] border-0">
            </iframe>
        </main>

    </div>

</body>
</html>
